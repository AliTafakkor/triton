[workspace]
authors = ["Ali Tafakkor <alitafakkor@gmail.com>"]
channels = ["conda-forge"]
name = "triton"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
# Launch the web interface
gui = "streamlit run src/triton/app.py"

# Run the CLI (e.g., pixi run triton mix --speech s.wav --noise n.wav --snr 5)
triton = "python src/triton/cli/main.py"

# Serve docs locally
docs = "mkdocs serve"

[dependencies]
python = ">=3.12,<3.13"
librosa = ">=0.11.0,<0.12"
numpy = ">=2.3.5,<3"
typer = ">=0.23.1,<0.24"
streamlit = ">=1.54.0,<2"
pydantic = ">=2.12.5,<3"
ffmpeg = ">=8.0.1,<9"
feedparser = ">=6.0.11,<7"
requests = ">=2.32.0,<3"

[feature.dev.dependencies]
pytest = ">=9.0.2,<10"

[feature.docs.dependencies]
mkdocs = ">=1.6.1,<2"
mkdocs-material = ">=9.6.7,<10"

[environments]
default = { features = ["dev", "docs"] }

[pypi-dependencies]
soundfile = "*"
openai-whisper = "*"
torch = "*"


site_name: Triton
site_description: "Speech-in-noise toolkit for the CONCH Lab"
site_url: "https://alitafakkor.github.io/triton/"
repo_url: "https://github.com/alitafakkor/triton"
repo_name: "triton"

theme:
  name: material
  logo: assets/logo.svg
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - CLI:
      - mix: cli/mix.md
      - ingest: cli/ingest.md
      - transcribe: cli/transcribe.md
      - degrade: cli/degrade.md
      - convert: cli/convert.md
  - API:
      - core.mixer: api/core.mixer.md
      - core.signal: api/core.signal.md
      - core.io: api/core.io.md
      - core.conversion: api/core.conversion.md
      - ingest.rss: api/ingest.rss.md
      - transcribe.whisper: api/transcribe.whisper.md
      - degrade.vocoder: api/degrade.vocoder.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/alitafakkor/triton"

site_name: Triton
site_description: "Speech-in-noise toolkit for the CONCH Lab"
site_url: "https://alitafakkor.github.io/triton/"
repo_url: "https://github.com/alitafakkor/triton"
repo_name: "triton"

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: slate
      primary: '#4a9873'
      accent: '#479bbe'
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
  extra_css:
    - assets/brandkit.css

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - GUI: gui.md
  - CLI:
      - mix: cli/mix.md
      - babble: cli/babble.md
      - files: cli/files.md
      - ingest: cli/ingest.md
      - transcribe: cli/transcribe.md
      - degrade: cli/degrade.md
      - convert: cli/convert.md
      - normalize: cli/normalize.md
      - matrix: cli/matrix.md
  - API:
      - core.mixer: api/core.mixer.md
      - core.signal: api/core.signal.md
      - core.io: api/core.io.md
      - core.spectrogram: api/core.spectrogram.md
      - core.conversion: api/core.conversion.md
      - core.project: api/core.project.md
      - core.pipeline_runtime: api/core.pipeline_runtime.md
      - core.pipeline_matrix: api/core.pipeline_matrix.md
      - ingest.rss: api/ingest.rss.md
      - transcribe.whisper: api/transcribe.whisper.md
      - degrade.vocoder: api/degrade.vocoder.md
      - degrade.noise_generator: api/degrade.noise_generator.md
      - degrade.noise_mixer: api/degrade.noise_mixer.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/alitafakkor/triton"
